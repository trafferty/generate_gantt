project:
  name: "My Project"           # required — used in chart title and output filename
  subtitle: "Q1 Roadmap"       # optional — appended to title as "Name — Subtitle"
  revision_date: "2026-03-15"  # optional — used in output filename; defaults to today's date
  start: "2026-02-25"          # optional — pins the left edge of the chart
  workdays: "M,T,W,Th,F"      # optional — default M–F; tokens: M T W Th F Sa Su
  legend: true                 # optional — set to false to hide the legend (default: true)

groups:
  - name: "Design"
    tasks:
      - id: wireframes
        name: "Create wireframes"
        assignee: "Alice"
        start: "2026-03-01"
        due: "2026-03-14"         # explicit end date

      - id: design_review
        name: "Design review"
        assignee: "Alice, Bob"
        start: "2026-03-15"
        duration: "3w"            # or compute end date from duration

      - id: design_handoff
        name: "Design handoff and developer briefing"
        assignee: "Bob"
        predecessor: design_review  # starts next working day after design_review ends
        duration: "3d"
